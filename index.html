<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://public-frontend-cos.metadl.com/mgx/img/favicon_atoms.ico" type="image/x-icon">
    <title>Boblox – Block World</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

   
   
    <!-- Block World Section -->
    <section class="world-section">
        <h2 class="section-title">Your Canvas</h2>
        <p class="section-subtitle">Select a color, then click blocks to paint. Hit reset to start over!</p>

        <!-- Color Palette -->
        <div class="color-palette">
            <div class="palette-color active" style="background:#E74C3C;" data-color="color-red" title="Red"></div>
            <div class="palette-color" style="background:#4A90D9;" data-color="color-blue" title="Blue"></div>
            <div class="palette-color" style="background:#7ED321;" data-color="color-green" title="Green"></div>
            <div class="palette-color" style="background:#F5A623;" data-color="color-yellow" title="Yellow"></div>
            <div class="palette-color" style="background:#BD10E0;" data-color="color-purple" title="Purple"></div>
            <div class="palette-color" style="background:#FF6B35;" data-color="color-orange" title="Orange"></div>
            <div class="palette-color" style="background:#00BCD4;" data-color="color-cyan" title="Cyan"></div>
            <div class="palette-color" style="background:#FF4081;" data-color="color-pink" title="Pink"></div>
        </div>

        <!-- Controls -->
        <div class="world-controls">
            <button class="btn btn-primary" id="resetBtn" style="padding:0.7rem 2rem; font-size:1rem;">🔄 Reset Grid</button>
            <button class="btn btn-secondary" id="randomBtn" style="padding:0.7rem 2rem; font-size:1rem;">🎲 Randomize</button>
        </div>

        <!-- Block Grid -->
        <div class="block-grid" id="blockGrid">
            <!-- 64 blocks (8x8) generated by JS -->
        </div>
    </section>

    
    <script type="module" src="./script.js"></script>
</body>
</html>
